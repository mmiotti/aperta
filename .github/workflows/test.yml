name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install aperta + mypy
        # mypy needs the package's own source on its import path to resolve
        # `aperta.*` imports; install editable + mypy itself.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[osm,topo,h3]" mypy
      - name: Type-check
        run: mypy --config-file pyproject.toml

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches `requires-python = ">=3.11"` and the classifiers in
        # pyproject.toml. Drop or extend versions here when the floor
        # moves.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install aperta + all extras
        # Installing every extra exercises the full test surface
        # (osmnx-backed paths in network_processing + osm_helpers; h3 in
        # geo_processing.build_h3_grid; rasterio/requests in topography).
        # If an extra grows expensive to install we can split into
        # separate jobs.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[osm,topo,h3]"

      - name: Run tests
        run: python -m unittest discover -s tests -t .
